services:
  localrouter:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - routerly_data:/data
    environment:
      NODE_ENV: production
      ROUTERLY_HOME: /data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  routerly_data:
