name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.changesets.outputs.hasChangesets }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so changeset can detect previous tags
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create or update "Version Packages" PR
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Runs when no changesets are pending (i.e. after the Version PR is merged).
      # Idempotent: skips silently if the tag already exists.
      - name: Build all packages
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: npm run build

      - name: Create tag and GitHub Release
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/service/package.json').version")
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

          ARCHIVE="routerly-${VERSION}.tar.gz"
          git archive --format=tar.gz --prefix="routerly-${VERSION}/" \
            --output="${ARCHIVE}" HEAD

          gh release create "$TAG" \
            --title "Routerly ${TAG}" \
            --generate-notes \
            "${ARCHIVE}" \
            scripts/install.sh \
            scripts/install.ps1 \
            scripts/install.mjs

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.has_changesets == 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=$(node -p "require('./packages/service/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            inebrio/routerly:latest
            inebrio/routerly:v${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
