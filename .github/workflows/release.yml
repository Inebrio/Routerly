name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so changeset can detect previous tags
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      # changesets/action either:
      # - opens/updates the "Version Packages" PR when changesets are pending, OR
      # - publishes the release (creates tag + GitHub Release) when that PR is merged
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Instead of `npm publish`, we just create the Git tag.
          # The actual GitHub Release with tarball is created in the next step.
          publish: npm run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # This step runs only after changesets/action has published (i.e. the
      # "Version Packages" PR was merged and tags were created).
      - name: Create GitHub Release with tarball
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          # Build a source tarball (excluding dev artefacts)
          ARCHIVE="routerly-${VERSION}.tar.gz"
          git archive --format=tar.gz --prefix="routerly-${VERSION}/" \
            --output="${ARCHIVE}" HEAD

          # Create the GitHub Release and attach the tarball
          gh release create "${TAG}" \
            --title "Routerly ${TAG}" \
            --generate-notes \
            "${ARCHIVE}"
